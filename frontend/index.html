<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIC Converter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>HEIC Converter</h1>
        <form id="conversionForm">
            <div class="form-group">
                <label for="inputPath">Sélectionner un fichier ou dossier HEIC :</label>
                <input type="text" id="inputPath" placeholder="Chemin du fichier ou dossier" required>
                <button type="button" id="browseBtn">Parcourir...</button>
            </div>
            <div class="form-group">
                <label for="outputDir">Dossier de sortie :</label>
                <input type="text" id="outputDir" placeholder="Dossier de destination" required>
                <button type="button" id="browseOutputBtn">Parcourir...</button>
            </div>
            <div class="form-group">
                <label for="quality">Qualité JPG (80-95) :</label>
                <input type="range" id="quality" min="80" max="95" value="85">
                <span id="qualityValue">85</span>
            </div>
            <button type="submit" id="convertBtn">Convertir</button>
        </form>
        <div id="status"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
